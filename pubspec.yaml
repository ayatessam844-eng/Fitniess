name: fitnies
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Networking ---
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0
  retrofit: 4.6.0
  internet_connection_checker: ^3.0.1
  json_annotation: ^4.9.0

  # --- Navigation ---
  go_router: ^14.2.0

  # --- Localization ---
  easy_localization: ^3.0.7+1

  # --- Local Storage ---
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # --- Functional / Error Handling ---
  dartz: ^0.10.1
  equatable: ^2.0.5

  # --- Chat with AI (Gemini) ---
  google_generative_ai: ^0.4.7
  flutter_markdown_plus: ^1.0.3
  flutter_chat_ui: ^2.11.1
  flutter_chat_core: ^2.9.0
  flutter_chat_types: ^3.6.2

  # --- Firebase ---
  firebase_core: ^4.2.0
  cloud_firestore: ^6.0.3

  # --- UI & Responsiveness ---
  cupertino_icons: ^1.0.8
  intl: any
  cached_network_image: ^3.4.1
  fluttertoast: ^8.2.12
  logger: ^2.6.0
  flutter_svg: ^2.2.0
  skeletonizer: ^2.1.0+1
  lottie: ^3.3.1
  google_fonts: ^6.3.2
  youtube_player_flutter: ^9.1.3
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.1
  pinput: ^5.0.2
  font_awesome_flutter: ^10.11.0
  blur: ^4.0.2
  numberpicker: ^2.1.2
  percent_indicator: ^4.2.5
  flutter_screenutil: ^5.9.3

  # --- Forms ---
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.0.0

  # --- Config / Env ---
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # --- Code Generation ---
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5
  retrofit_generator: ^9.7.0
  json_serializable: ^6.9.5

  # --- Lints ---
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5

  # --- Testing ---
  mockito: ^5.4.6
  mocktail: ^1.0.4
  network_image_mock: ^2.1.1

  # --- App Icons & Splash ---
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.13.1




flutter:
    uses-material-design: true
    generate: true

    assets:
      - assets/icons/
      - assets/images/
      - assets/svg/
      - secret.env
      - assets/animations/
      - assets/json/
      - assets/translations/

